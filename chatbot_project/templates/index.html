<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumi - Your Cute AI Chatbot</title>
    <link rel="stylesheet" href="/static/css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap"
        rel="stylesheet" />
</head>

<body>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loading-robot">
            <!-- Cute Robot Logo -->
            <img src="/static/images/lumi_robot.png" alt="Lumi"
                style="width:180px; height:180px; object-fit:cover; object-position: center top; border-radius:50%; border: 5px solid white; box-shadow: 0 10px 40px rgba(155,127,212,0.4);" />
            <p class="loading-text">Lumi is waking up...</p>
            <div class="loading-dots">
                <span></span><span></span><span></span>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" style="display:none;">

        <!-- Header -->
        <div class="header">
            <div class="header-logo">
                <!-- Small robot logo in header -->
                <img src="/static/images/lumi_robot.png" alt="Lumi"
                    style="width:60px; height:60px; object-fit:cover; object-position: center top; border-radius:50%; border: 3px solid white; box-shadow: 0 4px 14px rgba(155,127,212,0.4);" />
                <div class="header-text">
                    <h1>Lumi</h1>
                    <span class="status-dot"></span>
                    <span class="status-text">Online & Ready!</span>
                </div>
            </div>
        </div>

        <!-- Chat Window -->
        <div class="chat-window" id="chat-window">
            <!-- Welcome message appears here via JS -->
        </div>

        <!-- Quick Reply Buttons -->
        <div class="quick-replies" id="quick-replies">
            <button onclick="sendQuick('Hello!')">👋 Hello!</button>
            <button onclick="sendQuick('Tell me a joke')">😄 Joke</button>
            <button onclick="sendQuick('What can you do?')">💜 Help</button>
            <button onclick="sendQuick('How are you?')">🌿 How are you?</button>
            <button onclick="sendQuick('What is AI?')">🤖 What is AI?</button>
            <button onclick="sendQuick('Bye!')">👋 Bye</button>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Say something cute... 💜" autocomplete="off" />
            <button id="send-btn" onclick="sendMessage()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22 2L11 13" stroke="white" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
        </div>

    </div>

    <!-- Farewell Overlay -->
    <div id="farewell-overlay" style="display:none;">
        <div class="farewell-box">
            <img src="/static/images/lumi_robot.png" alt="Lumi" width="110"
                style="filter: drop-shadow(0 6px 18px rgba(155,127,212,0.25));" />
            <h2>Goodbye! 💜</h2>
            <p>Come back soon, okay? Lumi will miss you! ✨</p>
            <button onclick="restartChat()">Start Again 🌿</button>
        </div>
    </div>

    <script src="/static/js/script.js"></script>
</body>

</html>
